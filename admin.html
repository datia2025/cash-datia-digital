<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Auditoría Financiera - Admin</title>
    <!-- Inter Font for Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Estilos específicos para el panel de administración */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Inter', 'Segoe UI', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .admin-header {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.18);
            margin-bottom: 2rem;
            border-left: 5px solid #2b6cb0;
        }

        .admin-header h1 {
            color: #2d3748;
            margin: 0;
            font-size: 1.8rem;
        }

        .admin-header p {
            color: #718096;
            margin-top: 0.5rem;
        }

        .audit-section {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.18);
            margin-bottom: 2rem;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .audit-section:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .audit-year-header {
            background-color: #2d3748;
            color: white;
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .audit-year-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .audit-table {
            width: 100%;
            border-collapse: collapse;
        }

        .audit-table th,
        .audit-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e2e8f0;
        }

        .audit-table th {
            background-color: #f8fafc;
            color: #4a5568;
            font-weight: 600;
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .audit-table tr:hover {
            background-color: #f7fafc;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-danger {
            background-color: #fed7d7;
            color: #c53030;
        }

        .badge-warning {
            background-color: #feebc8;
            color: #c05621;
        }

        .badge-success {
            background-color: #c6f6d5;
            color: #2f855a;
        }

        .badge-info {
            background-color: #bee3f8;
            color: #2b6cb0;
        }

        .indicator-name {
            font-weight: 600;
            color: #2d3748;
        }

        .finding-title {
            display: block;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 0.25rem;
        }

        .finding-text {
            color: #4a5568;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .annual-report-card {
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem;
        }

        .annual-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid #bee3f8;
            padding-bottom: 0.5rem;
        }

        .score-badge {
            background-color: #2b6cb0;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div class="admin-container">
        <header class="admin-header">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>Panel de Auditoría Financiera</h1>
                    <p>Vista Administrativa - Repositorio de Hallazgos</p>
                </div>
                <div>
                    <span class="badge badge-info" style="font-size: 1rem; padding: 0.5rem 1rem;">Confidencial</span>
                </div>
            </div>
        </header>

        <div id="audit-content">
            <!-- Contenido generado dinámicamente -->
        </div>
    </div>

    <!-- Cargar Datos -->
    <script src="insights.js"></script>
    <script src="data.js"></script>

    <!-- Script de Renderizado Admin -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('audit-content');

            // Ordenar años de más reciente a más antiguo
            const years = Object.keys(auditRepository).sort((a, b) => b - a);

            years.forEach(year => {
                const yearData = auditRepository[year];
                const section = document.createElement('div');
                section.className = 'audit-section';

                let html = `
                    <div class="audit-year-header">
                        <span class="audit-year-title">Ejercicio Fiscal ${year}</span>
                    </div>
                `;

                // Renderizar Reporte Anual si existe
                if (yearData.Annual && yearData.Annual.report) {
                    const report = yearData.Annual.report;
                    html += `
                        <div class="annual-report-card">
                            <div class="annual-header">
                                <h3 style="margin:0; color: #2c5282;">${report.title.es}</h3>
                                <div class="score-badge">Score: ${report.score}</div>
                            </div>
                            <p style="color: #2d3748; margin-top: 0.5rem;">${report.text.es}</p>
                        </div>
                    `;
                }

                // Tabla de Hallazgos
                html += `
                    <table class="audit-table">
                        <thead>
                            <tr>
                                <th style="width: 100px;">Periodo</th>
                                <th>Detalle de Auditoría Segmentado (Hallazgos)</th>
                            </tr>
                        </thead>
                        <tbody>
                `;

                // Ordenar trimestres (4Q -> 1Q)
                const quarters = ['4Q', '3Q', '2Q', '1Q'];

                quarters.forEach(q => {
                    if (yearData[q] && yearData[q].findings) {
                        const findings = yearData[q].findings;

                        // Crear una celda única con todos los hallazgos para ese trimestre
                        let findingsHtml = '<div style="display: flex; flex-direction: column; gap: 1rem;">';

                        findings.forEach(item => {
                            const badgeColors = {
                                'success': '#c6f6d5',
                                'warning': '#feebc8',
                                'danger': '#fed7d7',
                                'info': '#bee3f8'
                            };

                            const textColors = {
                                'success': '#22543d',
                                'warning': '#744210',
                                'danger': '#742a2a',
                                'info': '#2a4365'
                            };

                            const bgColor = badgeColors[item.type] || '#edf2f7';
                            const textColor = textColors[item.type] || '#2d3748';

                            findingsHtml += `
                                <div style="display: flex; align-items: start; gap: 0.75rem; padding: 0.75rem; background-color: ${bgColor}; border-radius: 6px;">
                                    <div style="min-width: 24px; color: ${textColor}; padding-top: 2px;">
                                        <i data-lucide="${item.icon}"></i>
                                    </div>
                                    <div>
                                        <strong style="display: block; color: ${textColor}; margin-bottom: 0.25rem;">${item.title}</strong>
                                        <span style="color: #4a5568;">${item.text}</span>
                                    </div>
                                </div>
                            `;
                        });

                        findingsHtml += '</div>';

                        html += `
                            <tr>
                                <td style="vertical-align: top; padding-top: 1.5rem;"><strong>${q}</strong></td>
                                <td>
                                    ${findingsHtml}
                                </td>
                            </tr>
                        `;
                    }
                });

                html += `</tbody></table>`;
                section.innerHTML = html;
                container.appendChild(section);
            });

            // Inicializar iconos
            lucide.createIcons();
        });
    </script>
</body>

</html>
