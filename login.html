<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Dashboard Financiero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('assets/login_bg.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* Overlay for extra depth */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.4);
            z-index: 1;
        }

        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
            background: rgba(255, 255, 255, 0.9);
            padding: 12px 20px;
            border-radius: 16px;
            display: inline-flex;
        }

        .logo-container img {
            height: 24px;
            width: auto;
        }

        .divider {
            width: 1px;
            height: 20px;
            background: #cbd5e1;
        }

        h2 {
            color: white;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
        }

        p.subtitle {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.875rem;
            margin-bottom: 32px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            width: 18px;
            height: 18px;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.05);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            margin-top: 16px;
            color: #fda4af;
            font-size: 0.85rem;
            display: none;
            background: rgba(225, 29, 72, 0.1);
            padding: 8px;
            border-radius: 8px;
            border: 1px solid rgba(225, 29, 72, 0.2);
        }

        .footer-text {
            margin-top: 32px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
        }
    </style>
</head>

<body>
    <div class="overlay"></div>

    <div class="login-card">
        <div class="logo-container">
            <img src="https://datia.digital/assets/logo-CL9oxSYp.png" alt="Datia">
            <div class="divider"></div>
            <img src="assets/logo_mas.png" alt="MAS">
        </div>

        <h2>Bienvenido</h2>
        <p class="subtitle">Identifíquese para acceder al Dashboard Financiero</p>

        <form id="login-form">
            <div class="input-group">
                <i data-lucide="user"></i>
                <input type="text" id="username" placeholder="Usuario" required autocomplete="username">
            </div>
            <div class="input-group">
                <i data-lucide="lock"></i>
                <input type="password" id="password" placeholder="Contraseña" required autocomplete="current-password">
            </div>

            <button type="submit">Iniciar Sesión</button>
            <div id="error-msg" class="error-message">Credenciales incorrectas. Intente de nuevo.</div>
        </form>

        <p class="footer-text">Diseñado por Datia &copy; 2026</p>
    </div>

    <script>
        // Init Lucide icons
        lucide.createIcons();

        const form = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Validación (admin / datia2026)
            if (user === 'admin' && pass === 'datia2026') {
                // Guardar sesión simple
                localStorage.setItem('df_session', 'active_' + Date.now());
                window.location.href = 'maestro.html';
            } else {
                errorMsg.style.display = 'block';
                // Shake effect on error
                document.querySelector('.login-card').animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-5px)' },
                    { transform: 'translateX(5px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 200, iterations: 2 });
            }
        });

        // Limpiar error al escribir
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                errorMsg.style.display = 'none';
            });
        });
    </script>
</body>

</html>
