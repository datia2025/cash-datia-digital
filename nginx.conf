server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index maestro.html;

    # ── Autenticación HTTP Basic Auth ──────────────────────────
    auth_basic "Dashboard Financiero - Acceso Restringido";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # ── Servir archivos estáticos ───────────────────────────────
    location / {
        try_files $uri $uri/ /maestro.html;
    }

    # ── Sin caché para archivos de datos JS ─────────────────────
    location ~* \.(js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # ── Seguridad: ocultar versión de nginx en errores ───────────
    server_tokens off;
}
